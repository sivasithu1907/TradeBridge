server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path not matching a real file goes to index.html
    # so client-side routing (refreshing on /rfqs, etc.) works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container. "backend" is the service
    # name from docker-compose.yml -- Docker's internal DNS resolves it.
    location /api {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Static assets get long-lived caching; index.html itself does not
    # (so deploys take effect immediately on next page load).
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
